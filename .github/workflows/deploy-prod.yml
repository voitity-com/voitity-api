name: Deploy API

on:
  push:
    branches:
      - prod
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::139194331469:role/bigmelo-prod-github-actions-deploy-role
  ECR_REPOSITORY: bigmelo/voitity-api
  EC2_INSTANCE_ID: i-0133c4ba00b95904d
  API_ENV_SECRET_ID: bigmelo/prod/api/env

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:prod

      - name: Deploy on EC2 and run migrations
        run: |
          set -euo pipefail

          COMMAND_ID="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy $GITHUB_REPOSITORY@$GITHUB_SHA" \
            --parameters commands='[
              "set -euo pipefail",
              "cd /opt/bigmelo/api",
              "dnf install -y awscli >/dev/null 2>&1 || true",
              "aws secretsmanager get-secret-value --secret-id bigmelo/prod/api/env --region us-east-1 --query SecretString --output text > .env",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 139194331469.dkr.ecr.us-east-1.amazonaws.com",
              "/usr/local/bin/docker-compose pull",
              "/usr/local/bin/docker-compose run --rm api php artisan migrate --force",
              "/usr/local/bin/docker-compose up -d --remove-orphans",
              "docker image prune -f"
            ]' \
            --query "Command.CommandId" \
            --output text)"

          for attempt in {1..90}; do
            STATUS="$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || true)"

            case "$STATUS" in
              Success)
                aws ssm get-command-invocation --region "$AWS_REGION" --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" --query "StandardOutputContent" --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation --region "$AWS_REGION" --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" --query "StandardOutputContent" --output text || true
                aws ssm get-command-invocation --region "$AWS_REGION" --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" --query "StandardErrorContent" --output text || true
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Timed out waiting for SSM command $COMMAND_ID"
          exit 1
